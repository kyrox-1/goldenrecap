<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Recap AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-indigo-400">Golden Recap AI</h1>
        
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2 text-gray-300">မြန်မာစာ သို့မဟုတ် English ရိုက်ပါ</label>
            <textarea id="textInput" rows="4" class="w-full p-3 bg-gray-700 rounded-lg text-white border border-gray-600 focus:outline-none focus:border-indigo-500" placeholder="နေကောင်းလား လို့ မြန်မာလို ရိုက်လို့ရပါပြီ..."></textarea>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium mb-2 text-gray-300">အသံရွေးချယ်ပါ (Voice)</label>
            <select id="voiceSelect" class="w-full p-3 bg-gray-700 rounded-lg text-white border border-gray-600 focus:outline-none focus:border-indigo-500">
                <option value="21m00Tcm4TlvDq8ikWAM">Rachel (Female)</option>
                <option value="AZnzlk1XvdvUeBnXmlld">Domi (Female)</option>
                <option value="EXAVITQu4vr4xnSDxMaL">Bella (Female)</option>
                <option value="ErXwobaYiN019PkySvjV">Antoni (Male)</option>
                <option value="IKne3meq5aSn9XLyUdCD">Charlie (Male)</option>
                <option value="N2lVS1w4EtoT3ns4057m">Clyde (Male)</option>
            </select>
        </div>

        <button id="generateBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 cursor-pointer">
            Generate Voice 🎧
        </button>

        <div id="status" class="mt-4 text-center text-sm text-gray-400 hidden"></div>

        <div class="mt-6 text-center">
            <audio id="audioPlayer" controls class="w-full hidden mx-auto"></audio>
        </div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const text = document.getElementById('textInput').value;
            const voiceId = document.getElementById('voiceSelect').value;
            const statusDiv = document.getElementById('status');
            const audioPlayer = document.getElementById('audioPlayer');
            const generateBtn = document.getElementById('generateBtn');

            if (!text.trim()) {
                alert('ကျေးဇူးပြု၍ စာသားတစ်ခုခု ရိုက်ထည့်ပေးပါဗျာ။');
                return;
            }

            // UI အခြေအနေပြောင်းလဲခြင်း
            statusDiv.innerText = "မြန်မာစာကို ဘာသာပြန်ပြီး အသံထုတ်ပေးနေပါသည်... စောင့်ပါ။";
            statusDiv.classList.remove('hidden');
            audioPlayer.classList.add('hidden');
            generateBtn.disabled = true;
            generateBtn.innerText = "Processing... ⏳";

            try {
                // ၁။ Google Translate API သုံးပြီး ကာရာအိုကေ (Singlish) သို့မဟုတ် အင်္ဂလိပ်လို ပြောင်းခြင်း
                statusDiv.innerText = "စာသားကို AI ဖတ်နိုင်အောင် ပြောင်းလဲနေပါသည်...";
                const translateUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`;
                
                const transResponse = await fetch(translateUrl);
                if (!transResponse.ok) throw new Error('Translation failed');
                
                const transData = await transResponse.json();
                let translatedText = "";
                
                // ဘာသာပြန်ထားတဲ့ စာသားတွေကို ပြန်ပေါင်းယူခြင်း
                if (transData && transData[0]) {
                    transData[0].forEach(item => {
                        if (item[0]) translatedText += item[0] + " ";
                    });
                }

                if (!translatedText.trim()) {
                    translatedText = text; // ဘာသာပြန်မရရင် မူရင်းအတိုင်း သုံးမယ်
                }

                statusDiv.innerText = "ဆာဗာမှ အသံဖိုင် စတင်ထုတ်လုပ်နေပါပြီ...";

                // ၂။ အသံပြောင်းလဲပေးမယ့် Render Backend ဆီ ပို့ခြင်း
                const response = await fetch('https://goldenrecap-backend.onrender.com/generate-voice/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: translatedText,
                        voice_id: voiceId
                    })
                });

                if (!response.ok) {
                    throw new Error('ဆာဗာမှ Error ပြန်ပေးနေပါသည်။');
                }

                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);
                
                audioPlayer.src = audioUrl;
                audioPlayer.classList.remove('hidden');
                statusDiv.innerText = "အသံဖိုင် ပြောင်းလဲခြင်း အောင်မြင်ပါပြီ။";
            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Error: အသံမထွက်လာပါ။ နောက်တစ်ကြိမ် ပြန်စမ်းကြည့်ပါ။";
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerText = "Generate Voice 🎧";
            }
        });
    </script>
</body>
</html>
